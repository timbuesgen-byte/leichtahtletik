* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 1.5rem 1rem; }
.container { max-width: 960px; margin: 0 auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }

.add-btn:hover { background: #003560; }
.sec-btn { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #111; height: 34px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.sec-btn:hover { background: #f5f5f5; }

.pb-best-title { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

.result-card.is-pb { border-left: 3px solid #7F77DD; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-disc { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; }
.card-time { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; color: #002641; }
.card-meta { display: flex; flex-direction: column; gap: 5px; }
.card-meta-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; word-break: break-word; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
