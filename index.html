<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wettkampfergebnisse</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 1.5rem 1rem; }
.container { max-width: 960px; margin: 0 auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
.header-left h1 { font-size: 20px; font-weight: 600; }
.header-left p { font-size: 13px; color: #666; margin-top: 2px; }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.sync-status { font-size: 12px; padding: 4px 10px; border-radius: 99px; font-weight: 500; }
.sync-ok { background: #eaf3de; color: #3B6D11; }
.sync-err { background: #FCEBEB; color: #A32D2D; }
.sync-loading { background: #f0f0f0; color: #666; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: #fff; border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid #e5e5e5; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 600; }
.toolbar { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.toolbar select, .toolbar input[type="text"] { font-size: 13px; padding: 6px 10px; height: 34px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; }
.add-btn { background: #002641; color: #fff; border: none; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; height: 34px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.add-btn:hover { background: #003560; }
.sec-btn { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #111; height: 34px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.sec-btn:hover { background: #f5f5f5; }
.pb-best { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; }
.pb-best-title { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; }
.pb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px 24px; }
.pb-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
.pb-disc { color: #666; }
.pb-time-val { font-weight: 600; color: #3C3489; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.result-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.1rem; }
.result-card.is-pb { border-left: 3px solid #7F77DD; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-disc { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; }
.card-time { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; color: #002641; }
.card-meta { display: flex; flex-direction: column; gap: 5px; }
.card-meta-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; word-break: break-word; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
.card-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.pb-badge { display: inline-flex; align-items: center; gap: 3px; background: #EEEDFE; color: #3C3489; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
.place-badge { display: inline-flex; align-items: center; height: 20px; border-radius: 99px; font-size: 11px; font-weight: 600; padding: 0 8px; }
.place-1 { background: #FAEEDA; color: #633806; }
.place-2 { background: #f0f0ec; color: #444; }
.place-3 { background: #FAECE7; color: #712B13; }
.place-other { background: #f0f0f0; color: #666; }
.del-btn { background: none; border: none; color: #ccc; cursor: pointer; padding: 3px; border-radius: 4px; font-size: 16px; display: flex; align-items: center; }
.del-btn:hover { color: #E24B4A; }
.empty { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
.modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 400px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
.field { margin-bottom: 0.9rem; }
.field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
.field input, .field select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; background: #fff; color: #111; }
.field textarea { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 11px; font-family: monospace; resize: none; line-height: 1.5; background: #f9f9f9; color: #111; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
.btn-cancel { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
.btn-save { background: #002641; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
.import-info { font-size: 12px; color: #888; margin-top: 6px; line-height: 1.5; }
.time-hint { font-size: 11px; color: #888; margin-top: 3px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #002641; color: #fff; padding: 8px 20px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>🏆 Wettkampfergebnisse</h1>
      <p>TSV Bayer Leverkusen — Saison-Übersicht</p>
    </div>
    <div class="header-actions">
      <span class="sync-status sync-loading" id="sync-status"><span class="spinner"></span>Verbinde...</span>
      <button class="sec-btn" onclick="window.openImport()">↑ Import</button>
      <button class="add-btn" onclick="window.openModal()">+ Eintragen</button>
    </div>
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Wettkämpfe</div><div class="stat-value">–</div></div>
    <div class="stat-card"><div class="stat-label">Disziplinen</div><div class="stat-value">–</div></div>
    <div class="stat-card"><div class="stat-label">Siege</div><div class="stat-value">–</div></div>
    <div class="stat-card"><div class="stat-label">Bestzeiten</div><div class="stat-value">–</div></div>
  </div>

  <div id="pb-section"></div>

  <div class="toolbar">
    <select id="filter-disc" onchange="render()"><option value="">Alle Disziplinen</option></select>
    <select id="sort-col" onchange="render()">
      <option value="date-desc">Datum (neu → alt)</option>
      <option value="date-asc">Datum (alt → neu)</option>
      <option value="time-asc">Zeit (schnell → langsam)</option>
      <option value="time-desc">Zeit (langsam → schnell)</option>
      <option value="disc-asc">Disziplin A–Z</option>
    </select>
    <input type="text" id="search" placeholder="Suche..." oninput="render()" style="min-width:120px;flex:1;">
  </div>

  <div id="cards-container"><div class="empty"><span class="spinner"></span> Lade Daten...</div></div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0VSPV40lWiW9OAacsvFKcvCEgz-31pDA",
  authDomain: "leitathletik-tracker.firebaseapp.com",
  databaseURL: "https://leitathletik-tracker-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "leitathletik-tracker",
  storageBucket: "leitathletik-tracker.firebasestorage.app",
  messagingSenderId: "217887644808",
  appId: "1:217887644808:web:37d5d317485bb98ebf933d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const resultsRef = ref(db, 'results');

const DISCIPLINE_GROUPS = [
  { label: 'Lauf (Bahn)', options: ['60 m','100 m','200 m','400 m','800 m','1000 m','1500 m','2000 m','3000 m','5000 m','10000 m'] },
  { label: 'Straße / Cross', options: ['1 Meile','5 km Lauf','10 km Lauf','Halbmarathon','Marathon','Cross-Lauf'] },
  { label: 'Hindernis', options: ['60 m Hindernis','80 m Hindernis','100 m Hindernis','110 m Hindernis','400 m Hindernis','2000 m Hindernis','3000 m Hindernis'] },
  { label: 'Sprung', options: ['Weitsprung','Dreisprung','Hochsprung','Stabhochsprung'] },
  { label: 'Wurf / Stoß', options: ['Kugelstoßen','Diskuswurf','Speerwurf','Hammerwurf'] },
  { label: 'Staffel', options: ['Staffel 4x100 m','Staffel 4x400 m'] },
  { label: 'Mehrkampf', options: ['5-Kampf','7-Kampf','10-Kampf'] },
  { label: 'Sonstiges', options: ['Sonstiges'] }
];

function discSelectHTML(sel) {
  return DISCIPLINE_GROUPS.map(g =>
    `<optgroup label="${g.label}">${g.options.map(d =>
      `<option value="${d}"${d===sel?' selected':''}>${d}</option>`
    ).join('')}</optgroup>`
  ).join('');
}

let results = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (state === 'ok') { el.className='sync-status sync-ok'; el.innerHTML='✓ Synchronisiert'; }
  else if (state === 'err') { el.className='sync-status sync-err'; el.innerHTML='⚠ Keine Verbindung'; }
  else { el.className='sync-status sync-loading'; el.innerHTML='<span class="spinner"></span>Verbinde...'; }
}

function parseTime(t) {
  if (!t) return Infinity;
  // Komma als Dezimaltrenner normalisieren
  t = t.trim().replace(',', '.');
  const parts = t.split(':');
  if (parts.length===3) return +parts[0]*3600 + +parts[1]*60 + +parts[2];
  if (parts.length===2) return +parts[0]*60 + +parts[1];
  return parseFloat(t)||Infinity;
}

function formatDate(iso) {
  if (!iso) return '–';
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.${y}`;
}

function getPBs() {
  const pbs = {};
  results.forEach(r => {
    const t = parseTime(r.time);
    if (!pbs[r.discipline] || t < parseTime(pbs[r.discipline].time)) pbs[r.discipline] = r;
  });
  return pbs;
}

function renderStats() {
  const pbs = getPBs();
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Wettkämpfe</div><div class="stat-value">${results.length}</div></div>
    <div class="stat-card"><div class="stat-label">Disziplinen</div><div class="stat-value">${new Set(results.map(r=>r.discipline)).size}</div></div>
    <div class="stat-card"><div class="stat-label">Siege</div><div class="stat-value">${results.filter(r=>r.place&&+r.place===1).length}</div></div>
    <div class="stat-card"><div class="stat-label">Bestzeiten</div><div class="stat-value">${Object.keys(pbs).length}</div></div>`;
}

function renderPBSection() {
  const pbs = getPBs(); const keys = Object.keys(pbs);
  const sec = document.getElementById('pb-section');
  if (!keys.length) { sec.innerHTML=''; return; }
  sec.innerHTML = `<div class="pb-best"><div class="pb-best-title">⭐ Persönliche Bestzeiten</div><div class="pb-grid">${keys.map(k=>`<div class="pb-row"><span class="pb-disc">${k}</span><span class="pb-time-val">${pbs[k].time||'–'}</span></div>`).join('')}</div></div>`;
}

function placeBadge(place) {
  if (!place) return '';
  const n = parseInt(place);
  const cls = n===1?'place-1':n===2?'place-2':n===3?'place-3':'place-other';
  const label = n===1?'🥇 Gold':n===2?'🥈 Silber':n===3?'🥉 Bronze':`${n}. Platz`;
  return `<span class="place-badge ${cls}">${label}</span>`;
}

function render() {
  renderStats(); renderPBSection();
  const pbs = getPBs();
  const sel = document.getElementById('filter-disc');
  const curVal = sel.value;
  const discSet = [...new Set(results.map(r=>r.discipline))].sort();
  sel.innerHTML = '<option value="">Alle Disziplinen</option>' + discSet.map(d=>`<option value="${d}"${d===curVal?' selected':''}>${d}</option>`).join('');
  const filterDisc = sel.value;
  const sortVal = document.getElementById('sort-col').value;
  const searchVal = (document.getElementById('search').value||'').toLowerCase();

  let filtered = results.filter(r => {
    if (filterDisc && r.discipline!==filterDisc) return false;
    if (searchVal && !(`${r.competition} ${r.location} ${r.discipline}`).toLowerCase().includes(searchVal)) return false;
    return true;
  });

  filtered.sort((a,b) => {
    if (sortVal==='date-desc') return (b.date||'').localeCompare(a.date||'');
    if (sortVal==='date-asc') return (a.date||'').localeCompare(b.date||'');
    if (sortVal==='time-asc') return parseTime(a.time)-parseTime(b.time);
    if (sortVal==='time-desc') return parseTime(b.time)-parseTime(a.time);
    if (sortVal==='disc-asc') return (a.discipline||'').localeCompare(b.discipline||'');
    return 0;
  });

  const container = document.getElementById('cards-container');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty">${results.length===0?'Noch keine Ergebnisse eingetragen.':'Keine Treffer.'}</div>`;
    return;
  }

  container.innerHTML = `<div class="cards-grid">${filtered.map(r => {
    const isPB = pbs[r.discipline]&&pbs[r.discipline].fbKey===r.fbKey;
    const badges = [isPB?'<span class="pb-badge">⭐ PB</span>':'', placeBadge(r.place)].filter(Boolean).join('');
    return `<div class="result-card${isPB?' is-pb':''}">
      <div class="card-top">
        <div class="card-disc">${r.discipline||'–'}</div>
        <div class="card-time">${r.time||'–'}</div>
      </div>
      <div class="card-meta">
        ${r.competition?`<div class="card-meta-row">🏅 ${r.competition}</div>`:''}
        ${r.location?`<div class="card-meta-row">📍 ${r.location}</div>`:''}
        <div class="card-meta-row">📅 ${formatDate(r.date)}</div>
      </div>
      <div class="card-bottom">
        <div class="card-badges">${badges}</div>
        <button class="del-btn" onclick="window.deleteResult('${r.fbKey}')" title="Löschen">🗑</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

window.deleteResult = async function(fbKey) {
  if (!confirm('Eintrag löschen?')) return;
  try {
    await remove(ref(db, `results/${fbKey}`));
    showToast('Eintrag gelöscht.');
  } catch(e) { showToast('Fehler beim Löschen.'); }
};

window.openImport = function() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" id="overlay" onclick="if(event.target.id==='overlay')document.getElementById('modal-container').innerHTML=''">
      <div class="modal">
        <h2>↑ Daten importieren</h2>
        <div class="field">
          <label>JSON-Text hier einfügen (Strg+V)</label>
          <textarea id="import-text" rows="10" placeholder='[{"discipline":"800 m","date":"2026-04-25","time":"2:26,67",...}]' oninput="window.previewImport()"></textarea>
        </div>
        <div id="import-preview"></div>
        <div class="import-info">Bereits vorhandene Einträge (gleiche ID) werden nicht doppelt angelegt.</div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="document.getElementById('modal-container').innerHTML=''">Abbrechen</button>
          <button class="btn-save" id="btn-do-import" onclick="window.doImport()" disabled style="opacity:0.5;cursor:not-allowed;">Importieren</button>
        </div>
      </div>
    </div>`;
};

let importData = null;
window.previewImport = function() {
  const text = document.getElementById('import-text').value.trim();
  try {
    importData = JSON.parse(text);
    if (!Array.isArray(importData)) throw new Error();
    const existingIds = new Set(results.map(r => r.id||r.fbKey));
    const newCount = importData.filter(r => !existingIds.has(r.id)).length;
    document.getElementById('import-preview').innerHTML = `<div style="margin-top:8px;font-size:13px;">${importData.length} Einträge gefunden, davon <strong>${newCount} neu</strong>.</div>`;
    const btn = document.getElementById('btn-do-import');
    btn.disabled = false; btn.style.opacity='1'; btn.style.cursor='pointer';
  } catch {
    if (text.length > 5) document.getElementById('import-preview').innerHTML = `<div style="margin-top:8px;font-size:13px;color:#E24B4A;">Ungültiges Format.</div>`;
    importData = null;
  }
};

window.doImport = async function() {
  if (!importData) return;
  const existingIds = new Set(results.map(r => r.id||r.fbKey));
  const newEntries = importData.filter(r => !existingIds.has(r.id));
  const btn = document.getElementById('btn-do-import');
  btn.disabled = true; btn.textContent = 'Importiere...';
  try {
    for (const entry of newEntries) {
      const { id, ...data } = entry;
      await push(resultsRef, data);
    }
    document.getElementById('modal-container').innerHTML = '';
    showToast(`${newEntries.length} Einträge importiert und synchronisiert.`);
  } catch(e) {
    showToast('Fehler beim Import. Internetverbindung prüfen.');
    btn.disabled = false; btn.textContent = 'Importieren';
  }
};

window.openModal = function() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" id="overlay" onclick="if(event.target.id==='overlay')document.getElementById('modal-container').innerHTML=''">
      <div class="modal">
        <h2>+ Wettkampf eintragen</h2>
        <div class="field"><label>Disziplin</label><select id="f-disc"><option value="">– auswählen –</option>${discSelectHTML('')}</select></div>
        <div class="field-row">
          <div class="field"><label>Datum</label><input type="date" id="f-date" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="field"><label>Zeit / Weite</label><input type="text" id="f-time" placeholder="z.B. 9:42,5"><div class="time-hint">MM:SS,s oder H:MM:SS</div></div>
        </div>
        <div class="field"><label>Wettkampf / Veranstaltung</label><input type="text" id="f-comp" placeholder="z.B. DM U18, NK Holland"></div>
        <div class="field-row">
          <div class="field"><label>Ort / Land</label><input type="text" id="f-loc" placeholder="z.B. Nijmegen, NL"></div>
          <div class="field"><label>Platz (optional)</label><input type="number" id="f-place" min="1" placeholder="z.B. 3"></div>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="document.getElementById('modal-container').innerHTML=''">Abbrechen</button>
          <button class="btn-save" id="btn-save-entry" onclick="window.saveResult()">Speichern</button>
        </div>
      </div>
    </div>`;
};

window.saveResult = async function() {
  const disc = document.getElementById('f-disc').value;
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value.trim();
  const comp = document.getElementById('f-comp').value.trim();
  const loc = document.getElementById('f-loc').value.trim();
  const place = document.getElementById('f-place').value.trim();
  if (!disc) { alert('Bitte Disziplin auswählen.'); return; }
  if (!date) { alert('Bitte Datum angeben.'); return; }
  if (!time) { alert('Bitte Zeit angeben.'); return; }
  const btn = document.getElementById('btn-save-entry');
  btn.disabled = true; btn.textContent = 'Speichern...';
  try {
    await push(resultsRef, { discipline: disc, date, time, competition: comp, location: loc, place: place||null });
    document.getElementById('modal-container').innerHTML = '';
    showToast('Eintrag gespeichert und synchronisiert.');
  } catch(e) {
    alert('Fehler beim Speichern. Bitte Internetverbindung prüfen.');
    btn.disabled = false; btn.textContent = 'Speichern';
  }
};

onValue(resultsRef, (snapshot) => {
  results = [];
  if (snapshot.exists()) {
    snapshot.forEach(child => {
      results.push({ fbKey: child.key, ...child.val() });
    });
  }
  setSyncStatus('ok');
  render();
}, (error) => {
  setSyncStatus('err');
  console.error(error);
});
</script>
</body>
</html>
